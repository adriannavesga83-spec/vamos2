<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTRAX OFICIAL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#000;
    color:#fff;
    padding:20px;
}

/* CENTRADO RESPONSIVE */
.wrapper{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    width:100%;
    max-width:480px;
    background:rgba(18,18,18,0.95);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    padding:30px 20px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.logo{
    width:140px;
    margin-bottom:18px;
}

h1{
    font-size:1.8rem;
    font-weight:800;
    margin-bottom:16px;
    letter-spacing:1px;
}

.texto{
    color:#e6e6e6;
    font-size:1rem;
    line-height:1.7;
    margin-bottom:25px;
    font-weight:500;
}

/* BOTÓN TELEGRAM MEJORADO */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;

    width:100%;
    text-decoration:none;
    padding:18px;
    border-radius:14px;

    background:linear-gradient(90deg,#ff2d2d,#ff6a00,#ff2d2d);
    background-size:200%;
    background-position:left;

    color:white;
    font-size:1rem;
    font-weight:800;

    box-shadow:0 10px 30px rgba(255,60,0,0.35);
    transition:.3s ease;
}

.btn:hover{
    transform:translateY(-3px);
    background-position:right;
    box-shadow:0 15px 45px rgba(255,60,0,0.5);
}

.btn:active{
    transform:scale(0.98);
}

/* MÓVIL EXTRA */
@media(max-width:380px){

    .container{
        padding:25px 15px;
    }

    h1{
        font-size:1.6rem;
    }

    .texto{
        font-size:0.95rem;
    }

    .logo{
        width:120px;
    }
}

</style>
</head>

<body>

<div class="wrapper">

<div class="container">

    <img src="https://i.ibb.co/B51dNgRG/ANTRAX.png" class="logo">

    <h1>ANTRAX OFICIAL</h1>

    <div class="texto">
        Te enseño a ganar 2 palos diarios con tu NEQUI, para ver toda la información del negocio, únete al grupo de TELEGRAM con el botón de abajo 👇
    </div>

    <a href="https://t.me/+wOkDvhJV8INjYzNh" target="_blank" class="btn">

        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
            <path d="M21.5 2.5L2.8 9.7c-1.3.5-1.3 1.3-.2 1.6l4.8 1.5 1.8 5.7c.2.6.1.8.8.8.5 0 .7-.2 1-.5l2.3-2.2 4.8 3.5c.9.5 1.5.2 1.7-.8l3.2-15.1c.3-1.2-.4-1.8-1.5-1.3z"/>
        </svg>

        👉 UNETE AQUI 👈

    </a>

</div>

</div>

</body>
</html>
