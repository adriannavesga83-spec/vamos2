<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANTRAX OFICIAL</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:#000;
    color:#fff;
}

/* tarjeta elegante */
.container{
    width:100%;
    max-width:500px;
    background:rgba(18,18,18,0.9);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    padding:35px 25px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

.logo{
    width:150px;
    margin-bottom:20px;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
}

h1{
    color:#fff;
    font-size:2rem;
    font-weight:800;
    margin-bottom:18px;
    letter-spacing:1px;
}

.texto{
    color:#e6e6e6;
    font-size:1.1rem;
    line-height:1.8;
    margin-bottom:28px;
    font-weight:500;
}

/* botón elegante */
.btn{
    display:block;
    width:100%;
    text-decoration:none;
    padding:18px;
    border-radius:14px;
    background:linear-gradient(90deg,#ff2d2d,#ff6a00);
    color:white;
    font-size:1rem;
    font-weight:800;
    transition:.3s;
    box-shadow:0 10px 30px rgba(255,60,0,0.25);
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 40px rgba(255,60,0,0.35);
}

/* móvil */
@media(max-width:480px){

    .container{
        padding:28px 18px;
    }

    h1{
        font-size:1.7rem;
    }

    .texto{
        font-size:1rem;
    }

    .logo{
        width:130px;
    }
}

</style>
</head>

<body>

<div class="container">

    <img src="https://i.ibb.co/B51dNgRG/ANTRAX.png" alt="ANTRAX" class="logo">

    <h1>ANTRAX OFICIAL</h1>

    <div class="texto">
        Te enseño a ganar 2 palos diarios con tu NEQUI, para ver toda la información del negocio, únete a mi grupo de TELEGRAM con el botón de abajo 👇
    </div>

    <a href="https://t.me/+wOkDvhJV8INjYzNh" target="_blank" class="btn">
        👉 UNIRME AL GRUPO
    </a>

</div>

</body>
</html>
